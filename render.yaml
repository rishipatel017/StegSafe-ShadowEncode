services:
  # Backend Service
  - type: web
    name: stegsafe-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
    autoDeploy: true

  # Frontend Service
  - type: web
    name: stegsafe-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://stegsafe-backend.onrender.com/api
    autoDeploy: true
